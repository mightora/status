# Change these first
owner: mightora # Your GitHub organization or username, where this repository lives
repo: status # The name of this repository

sites:
  - name: Mightora.io
    url: https://mightora.io
  - name: TechTweedie
    url: https://techtweedie.github.io
  - name: Calculate Working Day - Test 1
    url: https://api.mightora.io/calculate-working-day/combined/?working_days=1,2,3&date=2022-12-23&x_working_days=6
  - name: Email Domain Checker - Test 1
    url: https://api.mightora.io/emailDomainChecker/checkDomain/?domain=bbc.co.uk
  - name: WiFi Captive Portal Helper - Connect Site - http://connect.mightora.io
    url: http://connect.mightora.io
  - name: WiFi Captive Portal Helper - Connected Site - https://connected.mightora.io
    url: https://connected.mightora.io
assignees: # Users to assign downtime issues (optional)
  - itweedie
status-website:
  # Add your custom domain name, or remove the `cname` line if you don't have a domain
  # Uncomment the `baseUrl` line if you don't have a custom domain and add your repo name there
  cname: status.mightora.io
  # baseUrl: /status
  logoUrl: https://raw.githubusercontent.com/mightora/mightora.io/refs/heads/main/static/safari-pinned-tab.svg
  faviconSvg: https://raw.githubusercontent.com/mightora/mightora.io/refs/heads/main/static/safari-pinned-tab.svg
  name: mightora.io status
  introTitle: "**mightora.io status** - The status of our free tools"
  introMessage: This status page provides **real-time** updates on the availability of free tools hosted on [mightora.io](https://mightora.io) for the Power Platform. Powered by GitHub Actions, Issues, and Pages. [**Learn more or get your own**](https://github.com/upptime/upptime)
  # Custom theme matching mightora.io look & feel (lime-green accents, Quicksand font)
  themeUrl: https://status.mightora.io/mightora-theme.css
  links:
    - rel: preconnect
      href: https://fonts.googleapis.com
    - rel: preconnect
      href: https://fonts.gstatic.com
    - rel: stylesheet
      href: https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap
  navbar:
    - title: Status
      href: /
    - title: Home
      href: https://mightora.io
    - title: Tools
      href: https://mightora.io/tools
    - title: About
      href: https://mightora.io/about
    - title: GitHub
      href: https://github.com/mightora

# Rebuild the static site every 15 minutes (instead of the default once per day)
# so that status changes are visible on the website quickly.
workflowSchedule:
  uptime: "*/5 * * * *"       # check endpoints every 5 min (default)
  staticSite: "*/15 * * * *"  # rebuild & deploy the site every 15 min
  summary: "0 0 * * *"        # update README daily (default)
  graphs: "0 0 * * *"         # regenerate graphs daily (default)
  responseTime: "0 23 * * *"  # response time report daily (default)
  updates: "0 3 * * *"        # check for template updates daily (default)

# Upptime also supports notifications, assigning issues, and more
# See https://upptime.js.org/docs/configuration
